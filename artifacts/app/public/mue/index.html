    <script>
(function(){
  var params = new URLSearchParams(location.search);
  var searchUrl = params.get('searchUrl') || 'https://www.google.com/search?q=';
  var _href = location.href;
  setInterval(function() {
    if (location.href !== _href) {
      var oldUrl = _href.replace(/#.*$/, '');
      var newUrl = location.href.replace(/#.*$/, '');
      _href = location.href;
      if (oldUrl === newUrl) return;
      window.parent.postMessage({ type: 'unstable-navigate', action: 'navigate', page: location.href }, '*');
    }
  }, 200);
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'set-search-engine' && e.data.searchUrl) {
      searchUrl = e.data.searchUrl;
    }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var input = e.target.closest('input');
      if (input && input.closest('.searchBar, .searchMain, .searchComponents')) {
        e.preventDefault();
        e.stopImmediatePropagation();
        var q = input.value.trim();
        if (q) window.parent.postMessage({ type: 'unstable-navigate', action: 'navigate', page: searchUrl + encodeURIComponent(q) }, '*');
      }
    }
  }, true);
  document.addEventListener('click', function(e) {
    var a = e.target.closest('a');
    if (a && a.href && /^https?:\/\//.test(a.href) && !a.href.startsWith(location.origin)) {
      e.preventDefault();
      e.stopImmediatePropagation();
      window.parent.postMessage({ type: 'unstable-navigate', action: 'navigate', page: a.href }, '*');
    }
  }, true);
})();
    </script>
